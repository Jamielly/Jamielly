name: Generate Trophy SVG

on:
  schedule:
    - cron: "0 3 * * *"   # todo dia às 03:00 UTC
  workflow_dispatch:        # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do seu repositório de perfil
        uses: actions/checkout@v4

      - name: Checkout do código-fonte do github-profile-trophy
        uses: actions/checkout@v4
        with:
          repository: ryo-ma/github-profile-trophy
          path: trophy-src

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Gerar o SVG do troféu
        working-directory: trophy-src
        env:
          GITHUB_TOKEN1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deno run --allow-net --allow-env --allow-read --allow-write ./render_svg.ts Jamielly ../assets radical

      - name: Commitar e enviar se houver mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: atualizar trophy svg"
          git push
